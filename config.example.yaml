# publicatiescan — voorbeeldconfig.
#
# Kopieer dit bestand naar config.yaml en vul het in voor je eigen organisatie.
# config.yaml staat in .gitignore en wordt dus nooit meegecommit.
#
# SCOPE — lees dit eerst. Vul hier ALLEEN publicatiekanalen van je EIGEN
# organisatie in. Deze tool op de portalen van een andere organisatie richten is
# scannen zonder grondslag; daar heb je niets te zoeken.


# ---------------------------------------------------------------------------
# 1. Wie ben je
# ---------------------------------------------------------------------------

# Je eigen e-maildomeinen. Een e-mailadres op zo'n domein is het werkadres van een
# medewerker — geen datalek — en krijgt daarom ernst 'Laag'. Laat je dit leeg, dan
# komt elk gevonden e-mailadres als 'Middel' in het rapport en verzuip je in ruis.
# Subdomeinen tellen automatisch mee.
#
# Vergeet je gemeenschappelijke regelingen niet: de omgevingsdienst, de veiligheids-
# regio en je shared-service-organisatie staan standaard in je bekendmakingssjablonen
# ("bezwaar kan via info@..."). Zet je die er niet bij, dan levert elke vergunning een
# vals-positief op.
eigen_domeinen:
  # - jouwgemeente.nl
  # - jouwomgevingsdienst.nl
  # - jouwshared-service.nl
  []

# Je organisatienaam zoals die in de officiële bekendmakingen staat (het veld
# dt.creator in de landelijke SRU-API). Voor gemeenten is dat vrijwel altijd
# gewoon de gemeentenaam, zonder "gemeente" ervoor. Meerdere mag: dan scan je
# meteen voor je samenwerkingspartners.
# Alleen nodig voor de --sru-modus.
gemeenten:
  # - Jouwgemeente
  []


# ---------------------------------------------------------------------------
# 2. Welke bronnen scan je  (het meerbronnige model)
# ---------------------------------------------------------------------------
# Een lijst 'bronnen'. Elke bron heeft een 'type' dat naar een connector wijst
# (avgscan/bronnen.py) plus typespecifieke parameters. Zet bronnen die je (nog)
# niet wilt draaien weg door ze te verwijderen of uit te commentariëren.
#
# Beschikbare types en hun status (getest 14-07-2026):
#   sru                 werkend  — officiële bekendmakingen via de landelijke KOOP-API
#   crawl               werkend  — beleefde HTML-crawl van je eigen website/portalen
#   openraadsinformatie werkend  — raadsinformatie via de landelijke Elasticsearch-API;
#                                  de tekst is daar al geëxtraheerd (snel, geen download).
#                                  Dekking en actualiteit verschillen per gemeente.
#   parlaeus / qualigraf werkend — zelfde platform; enumereert de publieke modules en haalt
#                                  de bijlagen op. Met van/tot scan je de volledige historie.
#                                  LET OP: robots.txt = Disallow: / → alleen ná crawl-akkoord.
#   mijnpublicaties     werkend  — terinzageleggingen op mijnpublicaties.nl (23 gemeenten
#                                  aangesloten, o.a. Amsterdam, Haarlem, Breda, Zwolle).
#                                  LET OP: alleen wat NU ter inzage ligt, geen archief; veel
#                                  organisaties publiceren er enkel een samenvatting. Leeg
#                                  betekent dus niet 'schoon verleden' — gebruik sru voor historie.
#   notubiz             deels    — nog niet af (enumeratie van document-id's); faalt luid.
#                                  Bouwplan staat in de README.
#   ibabs               werkend* — iBabs-raadsinformatie via de Public WCF Service (SOAP).
#                                  Vereist alleen een 'sitename' + IP-whitelisting bij iBabs
#                                  + een burger-account met view-rechten (GEEN api_key).
#                                  *tegen het gedocumenteerde contract gebouwd; verifieer op
#                                  je eigen site (de WSDL is IP-restricted, niet publiek).
#
# Een connector die niet kan draaien faalt LUID en wordt als 'niet uitgevoerd' gemeld —
# nooit stil als 'niets gevonden'. Een lege uitkomst mag nooit 'schoon' betekenen.
bronnen:
  # - naam: bekendmakingen
  #   type: sru
  #   gemeenten: [Jouwgemeente]        # standaard: de 'gemeenten:' hierboven
  #   vanaf: "2014-01-01"              # optioneel tijdvenster (dt.modified)
  #   tot:   "2026-12-31"
  #
  # - naam: raadsinformatie-landelijk
  #   type: openraadsinformatie
  #   gemeenten: [Jouwgemeente]        # moet als ori_<gemeente>-index bestaan, anders faalt het luid
  #
  # - naam: raadsinformatie-eigen-RIS   # Qualigraf/Parlaeus — werkend; robots Disallow: /
  #   type: qualigraf
  #   van: 2010                        # optioneel: itereer de jaren voor de volledige historie
  #   tot: 2026
  #   sites:
  #     - { gemeente: Jouwgemeente, host: jouwgemeente.parlaeus.nl }
  #   negeer_robots: false             # pas true ná crawl-akkoord + SOC/leverancier informeren
  #
  # - naam: terinzageleggingen
  #   type: mijnpublicaties
  #   organisatie_naam: "Gemeente Jouwgemeente"   # exacte naam op mijnpublicaties.nl
  #   # organisatie: 00000000-0000-0000-0000-000000000000   # of de GUID uit de portaal-URL
  #
  # - naam: raadsinformatie-iBabs      # iBabs Public WCF Service (SOAP) — geen api_key
  #   type: ibabs
  #   sitename: "jouwsite"             # je iBabs-site
  #   sinds: "2026-06-01"              # optioneel: alleen sindsdien gewijzigde agenda's
  #   # vanaf: "2014-01-01"            # of een publicatievenster (met 'tot')
  #   # tot:   "2026-12-31"
  #   # meetingtypes: ["Raadsplein"]   # optioneel: alleen deze agendatypes (naam of Id).
  #                                    # Combineerbaar met sinds/vanaf/tot. Draai
  #                                    # ibabs_diagnose.py voor de namen van je site.
  #   # Vooraf: geef je uitgaande IP door aan iBabs (whitelisting) en zorg dat het
  #   # burger-account 'view'-rechten heeft op de agendatypes die je wilt scannen.
  #
  # - naam: website-bijlagen
  #   type: crawl
  #   seeds: [ "https://www.jouwgemeente.nl/..." ]
  []

# Startpunten voor de OUDE enkelvoudige crawl-modus (zonder 'bronnen:' en zonder --sru).
# Voor nieuwe configuraties gebruik je liever een crawl-bron hierboven.
seeds:
  # - https://<jouwgemeente>.nl/...
  []

# Alleen links binnen deze domeinen (en subdomeinen) worden gevolgd. Leeg = automatisch
# afgeleid uit de seeds. Je vangrail tegen per ongeluk de halve internet afcrawlen.
allowed_domains: []

# Bestandstypen die worden gedownload en geanalyseerd.
file_extensions: [pdf, docx, xlsx, xlsm, pptx]


# ---------------------------------------------------------------------------
# 3. Waar landt het
# ---------------------------------------------------------------------------

# Downloads, statusdatabase en het rapport. ZET DIT BUITEN JE CLOUDDRIVE
# (OneDrive/SharePoint/Dropbox): het kunnen duizenden bestanden worden, en ze
# bevatten per definitie mogelijk persoonsgegevens. Absoluut pad mag ook.
output_dir: "./_scan-output"


# ---------------------------------------------------------------------------
# 4. Beleefdheid tegenover de server
# ---------------------------------------------------------------------------
# Deze waarden laat je met rust tenzij je een goede reden hebt. Je scant een
# productieomgeving; je wilt hem niet omtrekken en je wilt herkenbaar zijn.
politeness:
  respect_robots: true            # robots.txt volgen
  delay_seconds: 1.0              # pauze tussen requests per domein
  timeout_seconds: 30
  # Zet hier je EIGEN organisatie en een echt contactadres. Een beheerder die
  # dit verkeer in zijn logs ziet, moet binnen één minuut kunnen achterhalen wie
  # je bent en je kunnen bellen.
  user_agent: "<jouw organisatie> publicatiescan (interne AVG-controle; contact: <e-mailadres>)"


# ---------------------------------------------------------------------------
# 5. Grenzen (voorkomt een eindeloze crawl)
# ---------------------------------------------------------------------------
limits:
  max_pages: 5000                 # max. HTML-pagina's om te volgen
  max_files: 20000                # max. documenten om te analyseren
  max_depth: 8                    # klikdiepte vanaf een seed
  max_file_mb: 60                 # documenten groter dan dit overslaan


# ---------------------------------------------------------------------------
# 6. Detectie
# ---------------------------------------------------------------------------
# ---------------------------------------------------------------------------
# 7. OCR (optioneel) — ingescande documenten zonder tekstlaag alsnog lezen
# ---------------------------------------------------------------------------
# Een ingescande brief/formulier is voor de gewone extractie een plaatje. Juist
# daar zit soms het risico (een BSN op een gescand formulier). Met OCR aan worden
# die beeld-pagina's alsnog gelezen. On-prem via rapidocr (geen externe aanroep,
# persoonsgegevens blijven op de machine). LET OP: OCR is TRAAG (seconden per
# pagina) en niet bit-identiek reproduceerbaar; bevindingen worden gelabeld als
# "(OCR)". Vereist de extra install:  pip install rapidocr-onnxruntime
ocr:
  enabled: false                  # standaard uit; of gebruik de vlag --ocr
  dpi: 300                        # renderresolutie voor OCR (hoger = trager, scherper)
  min_confidence: 0.5             # tekst onder deze zekerheid wordt genegeerd (OCR-ruis)
  max_pages_per_doc: 20           # cap per document (voorkomt dat één dik PDF de run ophoudt)


detectors:
  bsn: true                       # 9-cijferige reeks, gevalideerd met de elfproef
  iban: true                      # NL-IBAN, gevalideerd met mod-97
  email: true
  telefoon: true
  geboortedatum: true
  naw: true                       # postcode + huisnummer
  paspoort_rijbewijs: true        # laag vertrouwen, alleen nabij een ID-term
  persoonsnaam: true              # naam achter een aanhef ("De heer J. ..."); met een
                                  # woonadres erbij wordt het Hoog: die combinatie is
                                  # het klassieke lek in gepubliceerde besluitbrieven
